name: Crates.io Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # Dependency policy gate — must pass before anything is published.
  # Mirrors the cargo-deny gate in ci.yml (pinned action SHA, advisories/bans/sources).
  cargo-deny:
    name: Dependency Policy (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2
        with:
          rust-version: stable
          command: check advisories bans licenses sources

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    # Gated by a GitHub deployment environment (add a required reviewer on
    # the "crates-io" environment to require manual approval before publish).
    environment: crates-io
    # Block publish until the dependency-policy gate passes.
    needs: [cargo-deny]
    # Only publish on tag push (not workflow_dispatch) to prevent accidental publishes
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    # Token scoped to this post-approval job only (kept out of the pre-publish cargo-deny gate).
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # Publish in dependency order with a wait between each so the index
      # propagates. The `publish` helper is IDEMPOTENT — it tolerates a version
      # that is already on crates.io (e.g. republishing after a manual publish)
      # but FAILS LOUDLY on any other error. This replaces the old blanket
      # `|| true`, which masked genuine publish failures (it once hid a real
      # failed publish — see issue #26).
      # NOTE: pulsehive-runtime dev-depends on pulsehive-openai, so openai must
      # be indexed BEFORE runtime is published, or runtime's verify build fails.
      - name: Publish crates (dependency order, fail-loud + idempotent)
        run: |
          set -uo pipefail

          publish() {
            local crate="$1"
            echo "::group::cargo publish -p $crate"
            local out status
            out="$(cargo publish -p "$crate" --no-verify 2>&1)"
            status=$?
            printf '%s\n' "$out"
            echo "::endgroup::"
            if [ "$status" -eq 0 ]; then
              echo "published: $crate"
              return 0
            fi
            # Idempotent: a version already on the index is not a failure.
            if printf '%s\n' "$out" | grep -qiE 'already (uploaded|exists)'; then
              echo "note: $crate is already published at this version — skipping (idempotent)"
              return 0
            fi
            echo "::error::publishing $crate failed (exit $status) — see log above" >&2
            return 1
          }

          publish pulsehive-core     || exit 1
          sleep 30
          publish pulsehive-openai   || exit 1
          publish pulsehive-anthropic || exit 1
          sleep 30
          publish pulsehive-runtime  || exit 1
          sleep 30
          publish pulsehive          || exit 1
