name: Crates.io Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # Dependency policy gate — must pass before anything is published.
  # Mirrors the cargo-deny gate in ci.yml (pinned action SHA, advisories/bans/sources).
  cargo-deny:
    name: Dependency Policy (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2
        with:
          rust-version: stable
          command: check advisories bans licenses sources

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    # Gated by a GitHub deployment environment (add a required reviewer on
    # the "crates-io" environment to require manual approval before publish).
    environment: crates-io
    # Block publish until the dependency-policy gate passes.
    needs: [cargo-deny]
    # Only publish on tag push (not workflow_dispatch) to prevent accidental publishes
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    # Token scoped to this post-approval job only (kept out of the pre-publish cargo-deny gate).
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # Publish in dependency order with wait between each.
      # "|| true" allows the step to pass if the version already exists
      # (e.g., when republishing after a manual publish).
      # NOTE: pulsehive-runtime dev-depends on pulsehive-openai, so openai must
      # be indexed BEFORE runtime is published, or runtime's verify build fails.
      - name: Publish pulsehive-core
        run: cargo publish -p pulsehive-core --no-verify || true

      - name: Wait for index propagation
        run: sleep 30

      - name: Publish pulsehive-openai
        run: cargo publish -p pulsehive-openai --no-verify || true

      - name: Publish pulsehive-anthropic
        run: cargo publish -p pulsehive-anthropic --no-verify || true

      - name: Wait for index propagation
        run: sleep 30

      - name: Publish pulsehive-runtime
        run: cargo publish -p pulsehive-runtime --no-verify || true

      - name: Wait for index propagation
        run: sleep 30

      - name: Publish pulsehive (meta-crate)
        run: cargo publish -p pulsehive --no-verify || true
