name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

# Least-privilege default for the automatic GITHUB_TOKEN.
# Jobs that need more (e.g. publish) opt in explicitly.
permissions:
  contents: read

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets --workspace -- -D warnings

      - name: Build
        run: cargo build --workspace

      # Exclude cdylib crates from Rust tests (they have language-runtime-dependent doc-tests).
      # Python bindings tested in python-tests job; Node.js bindings tested in node-tests job.
      - name: Test
        run: cargo test --workspace --exclude pulsehive-py --exclude pulsehive-js

      - name: Doc
        run: cargo doc --no-deps --workspace

  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create virtualenv and install deps
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install maturin pytest pytest-asyncio

      - name: Build Python bindings
        run: |
          source .venv/bin/activate
          cd pulsehive-py && maturin develop

      - name: Run Python tests
        run: |
          source .venv/bin/activate
          pytest pulsehive-py/tests/ -v

  node-tests:
    name: Node.js Tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22"]

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install npm deps
        working-directory: pulsehive-js
        run: npm install

      - name: Build Node.js bindings
        working-directory: pulsehive-js
        run: npm run build

      - name: Run Node.js tests
        working-directory: pulsehive-js
        run: npm test

  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2
        with:
          rust-version: stable
          command: check advisories bans licenses sources

  audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-audit
        uses: taiki-e/install-action@16b05812d776ae1dfaabc8277e421fb6d2506419 # v2.82.7
        with:
          tool: cargo-audit

      - name: Generate lockfile
        run: cargo generate-lockfile

      - name: Run audit
        run: cargo audit
