name: Python Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wheels:
    name: Build wheels (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macos-15 (not macos-latest): macos-latest now defaults to Xcode 26,
          # whose relocated clang_rt.osx breaks rustc linking. macos-15 ships a
          # pre-26 Xcode; the step below pins the compiler via DEVELOPER_DIR.
          - os: macos-15
            target: aarch64-apple-darwin
            platform: macOS-arm64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: Linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: Windows-x86_64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # Pin the compiler to a pre-26 Xcode via DEVELOPER_DIR (which OVERRIDES
      # xcode-select). Xcode 26 relocated clang_rt.osx and breaks rustc linking.
      # DEVELOPER_DIR set here propagates via GITHUB_ENV to the maturin step.
      - name: Use a pre-26 Xcode (avoid Xcode 26 clang_rt.osx linker break)
        if: runner.os == 'macOS'
        run: |
          sel=""
          for v in 16.4 16.3 16.2 16.1 16.0 15.4 15.2; do
            if [ -d "/Applications/Xcode_$v.app" ]; then sel="/Applications/Xcode_$v.app/Contents/Developer"; break; fi
          done
          if [ -z "$sel" ]; then
            echo "::error::No pre-26 Xcode found on this runner. Installed Xcodes:"
            ls -d /Applications/Xcode_*.app 2>/dev/null || true
            exit 1
          fi
          sudo xcode-select -s "$sel"
          echo "DEVELOPER_DIR=$sel" >> "$GITHUB_ENV"
          echo "Using Xcode: $sel"

      # Because pyo3 enables the abi3-py39 feature, maturin produces a single
      # forward-compatible cp39-abi3 wheel per platform that runs on CPython
      # 3.9+ (via the stable ABI) — instead of a cp312-only wheel that forced
      # 3.9-3.11 users onto an sdist -> local Rust build. Fixes #24.
      - name: Build abi3 wheel (cp39-abi3, CPython 3.9+)
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --manifest-path pulsehive-py/Cargo.toml
          manylinux: 2_28
          # Install OpenSSL dev headers in manylinux container (needed by reqwest/native-tls)
          before-script-linux: |
            if command -v yum &> /dev/null; then
              yum install -y openssl-devel perl-IPC-Cmd
            elif command -v apk &> /dev/null; then
              apk add openssl-dev perl
            elif command -v apt-get &> /dev/null; then
              apt-get update && apt-get install -y libssl-dev pkg-config
            fi

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.platform }}
          path: dist/*.whl

  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist --manifest-path pulsehive-py/Cargo.toml

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    # Only publish on tag push (not workflow_dispatch)
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment: pypi
    permissions:
      id-token: write # trusted publishing (OIDC)
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist/
