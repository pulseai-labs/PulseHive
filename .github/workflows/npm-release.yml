name: npm Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-binaries:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            platform: macOS-arm64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: Linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: Windows-x86_64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Install OpenSSL dev headers on Linux (needed by reqwest/native-tls)
      - name: Install OpenSSL (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config

      - name: Install npm deps
        working-directory: pulsehive-js
        run: npm install

      - name: Select a pre-26 Xcode (Xcode 26.5 clang_rt.osx layout breaks rustc linking)
        if: runner.os == 'macOS'
        run: |
          ls -d /Applications/Xcode_*.app 2>/dev/null || true
          for v in 16.4 16.3 16.2 16.1 16.0 15.4 15.2; do
            if [ -d "/Applications/Xcode_$v.app" ]; then sudo xcode-select -s "/Applications/Xcode_$v.app"; break; fi
          done
          echo "Selected Xcode: $(xcode-select -p)"

      # Wrapped in a retry loop to absorb a flaky upstream build dependency:
      # the `ort-sys` build script (pulled transitively via pulsehive-db's
      # builtin-embeddings -> ort / ONNX Runtime) downloads a prebuilt binary
      # from cdn.pyke.io, which intermittently returns HTTP 403 (rate-limit /
      # transient). That was breaking the Linux binary build. Retrying rides
      # over the transient failure. A durable upstream fix (pin the ONNX
      # Runtime lib or switch ort to load-dynamic in pulsehive-db) would remove
      # the need for this. See the release-ops "Known fragility" notes.
      - name: Build native addon (retry to absorb flaky ort-sys CDN 403)
        working-directory: pulsehive-js
        shell: bash
        run: |
          set -uo pipefail
          attempt=0
          max=3
          until [ "$attempt" -ge "$max" ]; do
            if npx napi build --platform --release --features napi --target ${{ matrix.target }}; then
              exit 0
            fi
            attempt=$((attempt + 1))
            echo "napi build failed (attempt $attempt/$max) — likely a transient ort-sys cdn.pyke.io 403; retrying in 20s..."
            sleep 20
          done
          echo "::error::napi build failed after $max attempts"
          exit 1

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.platform }}
          path: pulsehive-js/pulsehive-js.*.node

  publish:
    name: Publish to npm
    needs: [build-binaries]
    runs-on: ubuntu-latest
    # Only publish on tag push (not workflow_dispatch)
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    # NPM_TOKEN is provisioned as a repository secret (see release-ops handoff).
    # Optional hardening, for parity with the crates-io / pypi jobs: move the
    # token to an `npm` deployment environment and add `environment: npm` here
    # so only this gated job can read it (and you can require a reviewer).
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: pulsehive-js
          pattern: binary-*
          merge-multiple: true

      - name: Install deps and prepare
        working-directory: pulsehive-js
        run: |
          npm install
          npx napi prepublish

      - name: Publish to npm
        working-directory: pulsehive-js
        shell: bash
        run: |
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "::warning::NPM_TOKEN secret is not set — skipping npm publish."
            echo "Add the NPM_TOKEN repository secret to enable @pulsehive/sdk publishing."
            exit 0
          fi
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
