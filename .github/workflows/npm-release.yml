name: npm Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-binaries:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            platform: macOS-arm64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: Linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: Windows-x86_64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Install OpenSSL dev headers on Linux (needed by reqwest/native-tls)
      - name: Install OpenSSL (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config

      - name: Install npm deps
        working-directory: pulsehive-js
        run: npm install

      - name: Select a pre-26 Xcode (Xcode 26.5 clang_rt.osx layout breaks rustc linking)
        if: runner.os == 'macOS'
        run: |
          ls -d /Applications/Xcode_*.app 2>/dev/null || true
          for v in 16.4 16.3 16.2 16.1 16.0 15.4 15.2; do
            if [ -d "/Applications/Xcode_$v.app" ]; then sudo xcode-select -s "/Applications/Xcode_$v.app"; break; fi
          done
          echo "Selected Xcode: $(xcode-select -p)"

      - name: Build native addon
        working-directory: pulsehive-js
        run: npx napi build --platform --release --features napi --target ${{ matrix.target }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.platform }}
          path: pulsehive-js/pulsehive-js.*.node

