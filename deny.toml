[graph]
all-features = true

[advisories]
# Transitive deps from pulsehive-db — can't fix until upstream updates
ignore = [
    "RUSTSEC-2025-0141",  # bincode unmaintained (used by pulsehive-db)
    "RUSTSEC-2024-0436",  # paste unmaintained (used by pulsehive-db)
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "AGPL-3.0-only",
    "Zlib",
    "BSL-1.0",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"
