[graph]
all-features = true

[advisories]
# Vulnerabilities always gate. Unmaintained advisories gate only for our DIRECT
# deps (actionable); transitive unmaintained crates (e.g. `paste` pulled in via
# pulsehive-db — outside our control) are surfaced but do not fail CI.
unmaintained = "workspace"
# IDs consciously ignored:
ignore = [
    # bincode 1.x is unmaintained (RUSTSEC-2025-0141). pulsehive-db pins bincode 1.3
    # for on-disk serialization; migrating to bincode 2.x is a tracked upstream
    # follow-up, not a vulnerability. cargo-audit treats this as a warning;
    # cargo-deny errors on it.
    "RUSTSEC-2025-0141",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "AGPL-3.0-only",
    "Zlib",
    "BSL-1.0",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"
